version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: kyc-backend
    environment:
      - MONGO_URL=mongodb://mongodb:27017
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - mongodb
    networks:
      - kyc-network

  mongodb:
    image: mongo:latest
    container_name: kyc-db
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kyc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kyc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kyc-network

networks:
  kyc-network:
    driver: bridge

volumes:
  mongodb_data:
